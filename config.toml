baseurl = "https://diegojromerolopez.github.io"
DefaultContentLanguage = "en"
title = "Diego J.'s Software Tar Pit"
theme = "beautifulhugo"
cover = "/img/cover.jpeg"
disqusShortname = "diego-j-s-software-tar-pit"

[taxonomies]
  category = "categories"
  tag = "tags"

[Author]
  name = "Diego J. Romero-López"
  email = "diegojromerolopez@gmail.com"
  github = "diegojromerolopez"
  linkedin = "diegojromerolopez"
  twitter = "diegojromerolop"

[Params]
  selfHosted = true
  subtitle = "Diego J.'s rambling thoughts about software"
  comments = false
  commit = false
  rss = true
  metaDataFormat = "yaml"
  pygmentsUseClasses = true
  pygmentCodeFences = true
  logo = "/img/diegoj-logo.png"
  favicon = "/img/favicon.ico"
  [permalinks]
    post = "/blog/:year/:month/:title/"
  paginatePath = "blog/page"
  contentDir = "content/post"

[frontmatter]
  date = [':filename', ':default']

[languages]
  [languages.en]
    contentDir = "content/en" # English
  [languages.es]
    contentDir = "content/es" # Spanish

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

[[menu.main]]
    name = "Blog"
    url = ""
    weight = 1

[[menu.main]]
    name = "About"
    url = "page/about/"
    weight = 2

[[menu.main]]
    name = "CV"
    url = "/cv.pdf"
    weight = 3

[[menu.main]]
    name = "Tags"
    url = "tags"
    weight = 4
